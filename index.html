function toggleMenu() {
  document.getElementById("menu").classList.toggle("open");
}
</script>
  
<script>
const modal = document.getElementById("buyModal");

document.querySelectorAll(".buy").forEach(btn=>{
  btn.onclick = () => {
    modal.classList.add("show");
  }
});

function closeModal(){
  modal.classList.remove("show");
}
</script>

/* ===== مودال انیمیشنی ===== */
.modal{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
    display:flex;
    justify-content:center;
    align-items:center;

    opacity:0;
    visibility:hidden;
    transition:0.3s ease;
}
    .hamburger {
  position: fixed;
  top: 15px;
  right: 15px;
  width: 35px;
  cursor: pointer;
  z-index: 1000;
}

.hamburger div {
  height: 4px;
  background: white;
  margin: 6px 0;
  border-radius: 5px;
  transition: 0.3s;
}

/* منو */
.menu {
  position: fixed;
  top: 60px;
  right: 15px;
  background: rgba(20,20,20,0.95);
  border-radius: 10px;
  overflow: hidden;
  max-height: 0;
  width: 160px;
  transition: max-height 0.4s ease;
  z-index: 999;
}

.menu.open {
  max-height: 200px;
}

.menu a {
  display: block;
  padding: 12px;
  color: white;
  text-decoration: none;
}

.menu a:hover {
  background: #333;
}

.modal-content{
    background:#1a1a1a;
    border:2px solid #ffd700;
    padding:30px;
    border-radius:15px;
    text-align:center;
    transform:scale(0.7);
    transition:0.3s ease;
}

.modal.show{
    opacity:1;
    visibility:visible;
}

.modal.show .modal-content{
    transform:scale(1);
}

.modal button{
    margin-top:15px;
    padding:10px 20px;
    background:#ffd700;
    border:none;
    border-radius:10px;
    cursor:pointer;
}
